spring:
  application:
    name: notes-service

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Europe/Moscow

  mvc:
    throw-exception-if-no-handler-found: true

server:
  port: 8181

# ==========================================
# Swagger / OpenAPI Configuration
# ==========================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    display-request-duration: true

# ==========================================
# Actuator / Monitoring Configuration
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# ==========================================
# Application Info
# ==========================================
info:
  app:
    name: Notes Service
    version: 1.0.0
    description: REST API для управления заметками
    java-version: ${java.version:17}
    spring-boot-version: ${spring-boot.version:3.1.5}

# ==========================================
# Logging Configuration
# ==========================================
logging:
  level:
    root: INFO
    com.example.notes: DEBUG
    org.springframework.web: INFO
    org.springframework.boot: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      file-name-pattern: logs/notes-service.%d{yyyy-MM-dd}.%i.log
