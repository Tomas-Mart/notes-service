name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  DOCKER_IMAGE: notes-service
  REGISTRY: ghcr.io

jobs:
  # ==========================================
  # Job 1: Build and Test
  # ==========================================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🔨 Build with Maven
        run: mvn clean compile

      - name: 🧪 Run tests
        run: mvn test

      - name: 📊 Generate coverage report
        run: mvn jacoco:report

      - name: 📤 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: 📦 Package JAR
        run: mvn package -DskipTests

      - name: 📤 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: notes-service.jar
          path: target/notes-service-*.jar

  # ==========================================
  # Job 2: API Tests
  # ==========================================
  api-tests:
    name: 🌐 API Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: notes-service.jar
          path: target/

      - name: 🚀 Start application
        run: |
          java -jar target/notes-service-*.jar &
          sleep 15

      - name: ✅ Health check
        run: |
          curl -f http://localhost:8181/actuator/health || exit 1

      - name: 🧪 Run API tests
        run: |
          chmod +x full-test.sh
          ./full-test.sh

      - name: 📊 Get metrics
        run: |
          curl -s http://localhost:8181/actuator/metrics | jq '.' || true

  # ==========================================
  # Job 3: Docker Build
  # ==========================================
  docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Wait for image to be available
        run: |
          echo "Waiting for image to be available..."
          for i in {1..10}; do
            if docker pull ${{ env.REGISTRY }}/${{ github.repository }}:latest > /dev/null 2>&1; then
              echo "✅ Image is available!"
              break
            fi
            echo "Attempt $i/10: Waiting..."
            sleep 5
          done

      - name: 🔍 Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}:latest
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        continue-on-error: true

  # ==========================================
  # Job 4: Deploy to Production (исправлен)
  # ==========================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [ docker, deploy-swagger ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Pull and run container
        run: |
          # Приводим имя образа к нижнему регистру (требование GHCR)
          IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "Using image: $IMAGE_NAME"
          
          docker pull $IMAGE_NAME:latest
          docker run -d -p 8181:8181 --name notes-app \
            $IMAGE_NAME:latest

      - name: ✅ Health check
        run: |
          sleep 10
          curl -f http://localhost:8181/actuator/health || exit 1

      - name: 🧪 Smoke test
        run: |
          curl -f http://localhost:8181/api/notes || exit 1
          curl -f http://localhost:8181/swagger-ui.html || exit 1

  # ==========================================
  # Job 5: Deploy Swagger UI to GitHub Pages
  # ==========================================
  deploy-swagger:
    name: 📚 Deploy Swagger UI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: notes-service.jar
          path: target/

      - name: 🚀 Start app and generate OpenAPI
        run: |
          nohup java -jar target/notes-service-*.jar > app.log 2>&1 &
          echo "Ожидание запуска приложения..."
          for i in {1..30}; do
            if curl -s http://localhost:8181/actuator/health > /dev/null 2>&1; then
              echo "Приложение готово!"
              break
            fi
            echo "Попытка $i/30: Ожидание..."
            sleep 2
          done
          if ! curl -s http://localhost:8181/actuator/health > /dev/null 2>&1; then
            echo "Приложение не запустилось!"
            cat app.log
            exit 1
          fi
          curl -o openapi.json http://localhost:8181/v3/api-docs
          pkill -f "notes-service" || true

      - name: 📄 Generate Swagger UI
        run: |
          # Скачиваем и распаковываем Swagger UI
          wget -O swagger-ui.zip https://github.com/swagger-api/swagger-ui/archive/refs/heads/master.zip
          unzip -q swagger-ui.zip
          mkdir -p swagger-ui
          cp -r swagger-ui-master/dist/* swagger-ui/

          # Исправляем ссылку в swagger-initializer.js (вместо index.html)
          sed -i 's|https://petstore.swagger.io/v2/swagger.json|./openapi.json|g' swagger-ui/swagger-initializer.js

          # Копируем файлы
          cp openapi.json swagger-ui/
          cp index.md swagger-ui/

          # ✅ СОЗДАЁМ index.html ДЛЯ ПЕРЕНАПРАВЛЕНИЯ
          echo '<!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=./swagger/">
          </head>
          <body>
            <p>Redirecting to <a href="./swagger/">Swagger UI</a>...</p>
          </body>
          </html>' > swagger-ui/index.html
          
          # ✅ КОПИРУЕМ ЕГО В КОРЕНЬ (для главной страницы)
          cp swagger-ui/index.html swagger-ui/../

      - name: 📤 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: swagger-ui
          publish_branch: gh-pages
          destination_dir: swagger
          keep_files: false
          force_orphan: true