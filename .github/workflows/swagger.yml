name: Deploy Swagger UI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and run app
        run: |
          # Запускаем приложение в фоне
          nohup mvn spring-boot:run > app.log 2>&1 &
          
          # Ждем запуска с проверкой
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8181/actuator/health > /dev/null 2>&1; then
              echo "Application is ready!"
              break
            fi
            echo "Attempt $i/30: Waiting..."
            sleep 2
          done
          
          # Проверяем, что приложение запущено
          if ! curl -s http://localhost:8181/actuator/health > /dev/null 2>&1; then
            echo "Application failed to start!"
            cat app.log
            exit 1
          fi
          
          # Генерируем OpenAPI спецификацию
          curl -o openapi.json http://localhost:8181/v3/api-docs
          
          # Останавливаем приложение
          pkill -f "spring-boot:run" || true

      - name: Generate Swagger UI
        uses: Legion2/swagger-ui-action@v1
        with:
          output: swagger-ui
          spec-file: openapi.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: swagger-ui
          publish_branch: gh-pages