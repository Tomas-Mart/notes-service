name: Deploy Swagger UI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Run app and generate OpenAPI
        run: |
          # Запускаем JAR в фоне
          nohup java -jar target/notes-service-*.jar > app.log 2>&1 &
          
          # Ждем запуска с проверкой через health endpoint
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8181/actuator/health > /dev/null 2>&1; then
              echo "Application is ready!"
              break
            fi
            echo "Attempt $i/30: Waiting..."
            sleep 2
          done
          
          # Проверяем, что приложение запущено
          if ! curl -s http://localhost:8181/actuator/health > /dev/null 2>&1; then
            echo "Application failed to start!"
            cat app.log
            exit 1
          fi
          
          # Генерируем OpenAPI спецификацию
          curl -o openapi.json http://localhost:8181/v3/api-docs
          
          # Останавливаем приложение
          pkill -f "notes-service" || true

      - name: Generate Swagger UI
        uses: Legion2/swagger-ui-action@v1
        with:
          output: swagger-ui
          spec-file: openapi.json
          token: ${{ secrets.GITHUB_TOKEN }}  # Явно передаем токен в with
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Добавляем и этот вариант

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: swagger-ui
          publish_branch: gh-pages